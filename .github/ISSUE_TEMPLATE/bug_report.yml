name: Bug Report
description: Report a bug with the Lumentree integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out this form.
        Before submitting, check the [troubleshooting guide](https://github.com/ngoviet/lumentreeHA#troubleshooting).
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "2025.1.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      placeholder: "v5.1.2"
    validations:
      required: true
  - type: input
    id: device_model
    attributes:
      label: Inverter Model
      placeholder: "SUNT-4.0kW-H"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste HA logs with "lumentree" filter. Enable debug logging first.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checklist
      options:
        - label: I have checked the troubleshooting guide
        - label: I have enabled debug logging and checked the logs
        - label: I am running the latest version of the integration
